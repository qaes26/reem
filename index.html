<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هاتف ريم - عالم من الحب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0f0c29;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Phone Container */
        .phone {
            width: 340px;
            height: 700px;
            background: #111;
            border-radius: 45px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 0 10px #1a1a24;
            position: relative;
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        /* Screen Inner */
        .screen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-image: url('https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            overflow: hidden;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        /* Romantic Overlay */
        .romantic-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(30,0,50,0.3) 0%, rgba(200,50,100,0.4) 100%);
            z-index: 1;
        }

        /* Floating Hearts Animation */
        .heart {
            position: absolute;
            bottom: -20px;
            width: 15px;
            height: 15px;
            background-color: rgba(255, 100, 150, 0.6);
            transform: rotate(-45deg);
            animation: floatUp 8s infinite ease-in;
            z-index: 2;
        }
        .heart::before, .heart::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: rgba(255, 100, 150, 0.6);
            border-radius: 50%;
        }
        .heart::before { top: -7.5px; left: 0; }
        .heart::after { left: 7.5px; top: 0; }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(-45deg) scale(0.8); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-700px) rotate(-45deg) scale(1.2); opacity: 0; }
        }

        /* Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* App Icon Interaction */
        .app-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .app-btn:active {
            transform: scale(0.85);
            filter: brightness(0.8);
        }

        /* Lock Screen swipe hint animation */
        @keyframes bounce-up {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-up {
            animation: bounce-up 2s infinite;
        }

        /* Views */
        #lock-screen { z-index: 10; }
        #home-screen { z-index: 5; opacity: 0; pointer-events: none; }
        #app-view { z-index: 20; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        .app-open { transform: translateY(0) !important; }
        
        .hide-screen { opacity: 0; pointer-events: none; transform: scale(1.05); }
        .show-screen { opacity: 1 !important; pointer-events: auto !important; transform: scale(1) !important; }

        /* Notch */
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 25px;
            background: #111;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
            z-index: 50;
        }
    </style>
</head>

        // --- Clock & Date System (12-hour format in Arabic) ---
        function updateTime() {
            const now = new Date();
            
            // Time logic
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'م' : 'ص';
            
            hours = hours % 12;
            hours = hours ? hours : 12; // '0' becomes '12'
            minutes = minutes < 10 ? '0' + minutes : minutes;
            
            const timeString = `${hours}:${minutes}`;
            
            document.getElementById('time-display').innerText = timeString;
            document.getElementById('status-time').innerText = timeString;
            document.getElementById('ampm-display').innerText = ampm;

            // Date logic (Arabic format)
            const days = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            const months = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
            
            const dayName = days[now.getDay()];
            const monthName = months[now.getMonth()];
            const dateNum = now.getDate();
            
            // Convert to arabic numerals if desired, but standard is fine for date. 
            // Let's use a nice arabic format string
            const arabicNumerals = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
            const convertNum = (num) => String(num).split('').map(c => arabicNumerals[c] || c).join('');
            
            document.getElementById('date-display').innerText = `${dayName}، ${convertNum(dateNum)} ${monthName}`;
        }

        setInterval(updateTime, 1000);
        updateTime(); // Initial call

        // --- Interaction Logic ---
        const lockScreen = document.getElementById('lock-screen');
        const homeScreen = document.getElementById('home-screen');
        const appView = document.getElementById('app-view');
        const unlockBtn = document.getElementById('unlock-btn');

        // Unlock Phone (Swipe/Click)
        function unlockPhone() {
            lockScreen.classList.add('hide-screen');
            setTimeout(() => {
                homeScreen.classList.add('show-screen');
            }, 200);
        }

        unlockBtn.addEventListener('click', unlockPhone);

        // Simple swipe up detection for lock screen
        let startY = 0;
        lockScreen.addEventListener('touchstart', e => { startY = e.changedTouches[0].screenY; });
        lockScreen.addEventListener('touchend', e => {
            let endY = e.changedTouches[0].screenY;
            if (startY - endY > 50) unlockPhone(); // Swiped up
        });

        // Open App
        window.openApp = function(appId) {
            const data = appsData[appId];
            if(!data) return;

            document.getElementById('app-title').innerText = data.title;
            document.getElementById('app-content').innerHTML = `
                ${data.icon}
                ${data.content}
            `;
            
            appView.classList.add('app-open');
        }

        // Close App
        window.closeApp = function() {
            appView.classList.remove('app-open');
        }

        // Generate Floating Hearts Background on Lock Screen
        function createHearts() {
            const container = document.getElementById('hearts-container');
            for(let i=0; i<10; i++) {
                setTimeout(() => {
                    let heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
                    heart.style.opacity = Math.random() * 0.5 + 0.3;
                    container.appendChild(heart);
                    
                    // remove and recreate
                    setTimeout(() => { heart.remove(); }, 10000);
                }, i * 800);
            }
        }
        createHearts();
        setInterval(createHearts, 10000);

    </script>
